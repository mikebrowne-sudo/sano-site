<!doctype html>
<html lang="en-NZ">
<head>
  <meta charset="utf-8" />
  <title>{{client.company_name}} — Commercial Cleaning Proposal — Sano</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />

  <!--
    Master JSON-driven proposal template.
    See: docs/commercial-proposals/README.md
    Field map: docs/commercial-proposals/field-map.md

    PLACEHOLDER SYNTAX (Mustache-compatible):
      {{path.to.value}}        — substitute (HTML-escaped)
      {{{path.to.value}}}      — substitute (raw, no escape — use sparingly)
      {{#array}}…{{/array}}    — iterate; inside, use {{.}} for primitives
                                  or {{prop}} for object properties
      {{^value}}…{{/value}}    — render if value is falsy / empty array
      {{#object}}…{{/object}}  — render once if object is truthy

    DATA SHAPE: see <script id="proposal-data"> below for the full
    example payload. The same shape is documented in field-map.md.

    RENDERING:
      Browser  → open this file directly. The inline renderer below
                 hydrates the template using window.PROPOSAL_DATA, or
                 falls back to the example payload in #proposal-data.
      Server   → render with any Mustache / Handlebars engine; replace
                 the example payload with the real one (or strip the
                 <script id="proposal-data"> block entirely).
      PDF      → render to HTML server-side, then drive Puppeteer /
                 Playwright with `page.pdf({ format: 'A4' })`.
  -->

  <style>
    /* ── Design tokens (matches tailwind.config.ts sage palette) ── */
    :root {
      --sage-50:  #F7F9F7;
      --sage-100: #E0EAE3;
      --sage-200: #C7D6CC;
      --sage-300: #7EC87A;
      --sage-500: #076653;
      --sage-600: #5C6B64;
      --sage-700: #06392E;
      --sage-800: #06231D;
      --ink:      #1F2A26;
      --muted:    #6B7872;
      --rule:     #E0EAE3;
      --bg:       #FFFFFF;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: #ECEEEC;
      color: var(--ink);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, system-ui, sans-serif;
      font-size: 11pt;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Page counter (drives "Page N" in every footer) ──────────
       counter-reset on the body so the count starts at 1 for the
       cover and increments by one per <article class="page">.
       Works in browser preview AND in Puppeteer / Playwright PDF
       output — no per-page hardcoding. */
    body { counter-reset: page-num; }

    /* ── Page (A4) ───────────────────────────────────────────────
       Flex column so a fixed header strip and footer strip sit at
       the top and bottom of every A4 sheet, with the main content
       filling the space between. Padding lives on each child so the
       three strips share consistent left / right margins without
       re-declaring them. */
    .page {
      display: flex;
      flex-direction: column;
      width: 210mm;
      min-height: 297mm;
      margin: 16mm auto;
      padding: 0;
      background: var(--bg);
      box-shadow: 0 1px 4px rgba(0,0,0,.06), 0 8px 32px rgba(0,0,0,.08);
      page-break-after: always;
      counter-increment: page-num;
    }
    .page:last-child { page-break-after: auto; }

    /* ── Per-page header strip ───────────────────────────────────
       Small running header rendered on every interior page. Hidden
       on the cover (the cover has its own larger brand block).
       Three-column flex: logo · title · client + date. */
    .page-header {
      display: flex;
      align-items: center;
      gap: 14pt;
      padding: 10mm 18mm 5mm;
      border-bottom: 1px solid var(--rule);
    }
    .page.cover .page-header { display: none; }
    .header-logo {
      height: 28pt;
      width: auto;
      flex: 0 0 auto;
    }
    .header-meta {
      flex: 1 1 auto;
      text-align: right;
      line-height: 1.3;
    }
    .header-title {
      font-family: 'Inter', sans-serif;
      font-size: 8pt;
      font-weight: 600;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--sage-500);
    }
    .header-sub {
      font-size: 9pt;
      color: var(--muted);
      margin-top: 2pt;
    }

    /* ── Page content ────────────────────────────────────────────
       Flex grow so short pages still push the footer to the
       bottom of the A4 sheet in the browser preview, and long
       pages let the browser / Puppeteer paginate naturally. */
    .page-content {
      flex: 1 1 auto;
      padding: 8mm 18mm;
    }

    /* ── Headings ─────────────────────────────────────────────── */
    h1, h2, h3, h4 { font-family: 'Noto Serif', Georgia, 'Times New Roman', serif; color: var(--sage-800); margin: 0; }
    h1 { font-size: 28pt; line-height: 1.1; letter-spacing: -0.01em; font-weight: 700; }
    h2 { font-size: 16pt; line-height: 1.2; font-weight: 700; margin: 0 0 10pt 0; }
    h3 { font-size: 12pt; line-height: 1.25; font-weight: 700; margin: 0 0 6pt 0; }
    h4 { font-size: 10.5pt; line-height: 1.3; font-weight: 600; margin: 0 0 4pt 0; color: var(--sage-700); }
    p { margin: 0 0 8pt 0; }

    .eyebrow {
      font-family: 'Inter', sans-serif;
      font-size: 8pt;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--sage-500);
    }

    /* ── Cover ────────────────────────────────────────────────── */
    .cover-grid {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 24pt;
      align-items: start;
      margin-bottom: 28pt;
    }
    .cover-meta {
      text-align: right;
      min-width: 180pt;
    }
    .cover-logo {
      max-width: 140pt;
      max-height: 60pt;
      margin-bottom: 12pt;
    }
    .meta-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 9pt;
    }
    .meta-table th {
      text-align: right;
      color: var(--muted);
      font-weight: 500;
      padding: 3pt 8pt 3pt 0;
      white-space: nowrap;
    }
    .meta-table td {
      text-align: right;
      color: var(--sage-800);
      font-weight: 600;
      padding: 3pt 0;
    }
    .cover-title { margin: 4pt 0 6pt 0; }
    .cover-sub { color: var(--muted); font-size: 10pt; }
    .cover-divider {
      height: 2pt;
      background: var(--sage-500);
      width: 56pt;
      margin: 10pt 0 18pt 0;
    }

    /* ── Section frame ────────────────────────────────────────── */
    section {
      margin-bottom: 22pt;
      page-break-inside: avoid;
    }
    section.scope, section.pricing { page-break-inside: auto; }

    .section-rule {
      border: 0;
      border-top: 1px solid var(--rule);
      margin: 18pt 0 14pt 0;
    }

    /* ── Parties block ───────────────────────────────────────── */
    .parties {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16pt;
    }
    .party-card {
      border: 1px solid var(--rule);
      border-radius: 6pt;
      padding: 10pt 12pt;
      background: var(--sage-50);
    }
    .party-card .label { font-size: 8pt; text-transform: uppercase; color: var(--sage-500); letter-spacing: 0.14em; font-weight: 600; }
    .party-card .name  { font-size: 11.5pt; font-weight: 600; color: var(--sage-800); margin-top: 3pt; }
    .party-card .line  { font-size: 9.5pt; color: var(--ink); margin-top: 1pt; }
    .party-card .muted { color: var(--muted); }

    /* ── Profile + schedule (definition lists) ────────────────── */
    dl.profile {
      display: grid;
      grid-template-columns: 35% 65%;
      gap: 4pt 12pt;
      margin: 0;
      font-size: 10pt;
    }
    dl.profile dt {
      color: var(--muted);
      font-weight: 500;
      padding: 3pt 0;
      border-bottom: 1px solid var(--rule);
    }
    dl.profile dd {
      color: var(--sage-800);
      font-weight: 600;
      margin: 0;
      padding: 3pt 0;
      border-bottom: 1px solid var(--rule);
    }
    dl.profile dt:last-of-type, dl.profile dd:last-of-type { border-bottom: 0; }

    /* ── Scope groups ─────────────────────────────────────────── */
    .scope-group {
      margin-bottom: 14pt;
      page-break-inside: avoid;
    }
    .scope-group h3 {
      padding-bottom: 4pt;
      border-bottom: 2px solid var(--sage-500);
      margin-bottom: 8pt;
    }
    .scope-paragraph {
      margin: 0 0 8pt 0;
      font-size: 10pt;
      color: var(--ink);
    }
    .scope-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10pt;
    }
    .scope-table th, .scope-table td {
      text-align: left;
      vertical-align: top;
      padding: 5pt 6pt;
      border-bottom: 1px solid var(--rule);
    }
    .scope-table th {
      font-weight: 600;
      color: var(--sage-700);
      background: var(--sage-50);
      font-size: 9pt;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .scope-table td.task { width: 56%; }
    .scope-table td.area { width: 22%; color: var(--muted); }
    .scope-table td.freq { width: 22%; font-weight: 600; color: var(--sage-700); white-space: nowrap; }
    .scope-table td .notes { font-size: 9pt; color: var(--muted); margin-top: 2pt; font-style: italic; }

    /* ── Optional paragraphs (Phase 4B parity) ─────────────────── */
    .optional-paragraph {
      margin-bottom: 12pt;
      page-break-inside: avoid;
    }
    .optional-paragraph:last-child { margin-bottom: 0; }
    .optional-paragraph h4 {
      color: var(--sage-700);
      margin-bottom: 4pt;
    }
    .optional-paragraph p {
      font-size: 10pt;
      color: var(--ink);
      margin: 0;
    }

    /* ── Assumptions / exclusions / compliance ────────────────── */
    .pillars {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14pt;
    }
    .pillar {
      border: 1px solid var(--rule);
      border-radius: 6pt;
      padding: 10pt 12pt;
    }
    .pillar h4 { color: var(--sage-700); margin-bottom: 6pt; }
    .pillar ul { margin: 0; padding-left: 16pt; }
    .pillar ul li { margin-bottom: 3pt; font-size: 10pt; }
    .pillar p { font-size: 10pt; color: var(--ink); }
    .compliance-block {
      margin-top: 12pt;
      padding: 10pt 12pt;
      border-left: 3pt solid var(--sage-500);
      background: var(--sage-50);
      font-size: 10pt;
    }

    /* ── Pricing summary ──────────────────────────────────────── */
    .pricing-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10.5pt;
    }
    .pricing-table td {
      padding: 6pt 8pt;
      border-bottom: 1px solid var(--rule);
    }
    .pricing-table td.label { color: var(--ink); }
    .pricing-table td.value { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
    .pricing-table tr.subtotal td { font-weight: 600; color: var(--sage-700); }
    .pricing-table tr.discount td.value { color: #B14B3D; }
    .pricing-table tr.total td {
      font-size: 13pt;
      font-weight: 700;
      color: var(--sage-800);
      border-bottom: 0;
      border-top: 2px solid var(--sage-500);
      padding-top: 9pt;
    }
    .pricing-table tr.annual td {
      font-size: 9.5pt;
      color: var(--muted);
      font-weight: 500;
      border-bottom: 0;
      padding-top: 2pt;
    }
    .gst-note {
      font-size: 9pt;
      color: var(--muted);
      margin-top: 8pt;
      font-style: italic;
    }

    /* ── Why Sano ─────────────────────────────────────────────── */
    .why-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12pt 16pt;
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .why-list li {
      font-size: 10pt;
      padding-left: 14pt;
      position: relative;
    }
    .why-list li::before {
      content: "";
      width: 6pt; height: 6pt;
      background: var(--sage-500);
      border-radius: 50%;
      position: absolute;
      left: 0; top: 5pt;
    }

    /* ── Acceptance ───────────────────────────────────────────── */
    .acceptance-blurb {
      background: var(--sage-50);
      border: 1px solid var(--sage-100);
      border-radius: 6pt;
      padding: 14pt 16pt;
      font-size: 10.5pt;
    }
    .signature-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16pt;
      margin-top: 18pt;
    }
    .sig-block { font-size: 9.5pt; }
    .sig-line {
      border-bottom: 1px solid var(--ink);
      height: 28pt;
      margin-bottom: 4pt;
    }
    .sig-block .label { color: var(--muted); }

    /* ── Footer (every page) ─────────────────────────────────── */
    .page-footer {
      flex: 0 0 auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 8pt;
      padding: 6mm 18mm 10mm;
      border-top: 1px solid var(--rule);
      font-size: 8.5pt;
      color: var(--muted);
    }
    .footer-company { text-align: left; }
    .footer-page    { text-align: center; font-variant-numeric: tabular-nums; }
    .footer-website { text-align: right; }
    /* CSS counter populates "Page N" without per-page hardcoding. */
    .page-number::before { content: "Page " counter(page-num); }

    /* ── Print rules ─────────────────────────────────────────── */
    @page { size: A4; margin: 0; }

    @media print {
      html, body { background: #FFFFFF; }
      .page {
        width: auto;
        min-height: auto;
        margin: 0;
        padding: 0;
        box-shadow: none;
      }
      /* Keep critical blocks intact across page breaks. */
      .scope-group        { page-break-inside: avoid; break-inside: avoid; }
      .scope-paragraph    { page-break-inside: avoid; break-inside: avoid; }
      .optional-paragraph { page-break-inside: avoid; break-inside: avoid; }
      .pricing-table      { page-break-inside: avoid; break-inside: avoid; }
      .totals             { page-break-inside: avoid; break-inside: avoid; }
      .party-card         { page-break-inside: avoid; break-inside: avoid; }
      .pillar             { page-break-inside: avoid; break-inside: avoid; }
      .sig-block          { page-break-inside: avoid; break-inside: avoid; }
      section             { page-break-inside: avoid; break-inside: avoid; }
      /* Override avoid for sections that legitimately span multiple
         pages so long scope and pricing lists can flow naturally. */
      section.scope, section.pricing { page-break-inside: auto; break-inside: auto; }
      .preview-banner { display: none !important; }
    }

    /* ── Preview-only banner (hidden in print) ────────────────── */
    .preview-banner {
      max-width: 210mm;
      margin: 16mm auto -8mm auto;
      padding: 8pt 14pt;
      background: #FFF8E0;
      border: 1px solid #F2D88A;
      border-radius: 6pt;
      font-size: 9pt;
      color: #6B5A1A;
    }
  </style>
</head>

  <!--
    Mustache-lite renderer (~80 lines, dependency-free).
    Supports: {{path}}, {{{raw}}}, {{#section}}…{{/section}},
              {{^inverted}}…{{/inverted}}, {{.}}
    Sections iterate arrays, render once for truthy objects, skip
    falsy/empty values.

    For server-side rendering you can ignore this script and feed the
    template body to any Mustache or Handlebars engine — the syntax is
    a strict subset of Mustache 3.x.
  -->
  <script>
    (function () {
      'use strict'

      function get(ctx, path) {
        if (path === '.') return ctx
        // Support array.length on arrays (used by {{#assumptions.length}}).
        if (path.endsWith('.length')) {
          const base = get(ctx, path.slice(0, -'.length'.length))
          return Array.isArray(base) ? base.length : (base ? base.length || 0 : 0)
        }
        const parts = path.split('.')
        let v = ctx
        for (const p of parts) {
          if (v == null) return undefined
          v = v[p]
        }
        return v
      }

      function escapeHtml(s) {
        return String(s)
          .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;')
      }

      function isTruthySection(v) {
        if (v == null || v === false || v === '' || v === 0) return false
        if (Array.isArray(v)) return v.length > 0
        return true
      }

      // Tokenise into a flat list: text | var | rawvar | section-open | inverted-open | section-close
      function tokenise(tpl) {
        const re = /\{\{\{([^}]+)\}\}\}|\{\{([#^/])?\s*([^}]+?)\s*\}\}/g
        const tokens = []
        let last = 0, m
        while ((m = re.exec(tpl)) !== null) {
          if (m.index > last) tokens.push({ type: 'text', value: tpl.slice(last, m.index) })
          if (m[1] != null) {
            tokens.push({ type: 'rawvar', name: m[1].trim() })
          } else {
            const sigil = m[2], name = m[3]
            if (sigil === '#')      tokens.push({ type: 'section', name: name })
            else if (sigil === '^') tokens.push({ type: 'inverted', name: name })
            else if (sigil === '/') tokens.push({ type: 'close', name: name })
            else                    tokens.push({ type: 'var', name: name })
          }
          last = re.lastIndex
        }
        if (last < tpl.length) tokens.push({ type: 'text', value: tpl.slice(last) })
        return tokens
      }

      // Recursive render against a context object.
      function render(tokens, ctx, start, end) {
        let out = ''
        let i = start
        while (i < end) {
          const t = tokens[i]
          if (t.type === 'text') { out += t.value; i++ }
          else if (t.type === 'var')    { const v = get(ctx, t.name); out += v == null ? '' : escapeHtml(v); i++ }
          else if (t.type === 'rawvar') { const v = get(ctx, t.name); out += v == null ? '' : String(v); i++ }
          else if (t.type === 'section' || t.type === 'inverted') {
            // Find matching close
            let depth = 1, j = i + 1
            while (j < end && depth > 0) {
              if ((tokens[j].type === 'section' || tokens[j].type === 'inverted') && tokens[j].name === t.name) depth++
              else if (tokens[j].type === 'close' && tokens[j].name === t.name) depth--
              if (depth > 0) j++
            }
            const v = get(ctx, t.name)
            if (t.type === 'inverted') {
              if (!isTruthySection(v)) out += render(tokens, ctx, i + 1, j)
            } else {
              if (Array.isArray(v)) {
                for (const item of v) {
                  const childCtx = (typeof item === 'object' && item !== null) ? item : { '.': item }
                  out += render(tokens, Object.assign({}, ctx, childCtx, { '.': item }), i + 1, j)
                }
              } else if (isTruthySection(v)) {
                const childCtx = (typeof v === 'object') ? Object.assign({}, ctx, v) : ctx
                out += render(tokens, childCtx, i + 1, j)
              }
            }
            i = j + 1
          }
          else { i++ } // stray close
        }
        return out
      }

      // ── NZD formatting helper applied to pricing block ────────
      function nzd(n) {
        if (n == null || isNaN(n)) return ''
        return new Intl.NumberFormat('en-NZ', { style: 'currency', currency: 'NZD' }).format(n)
      }
      function decoratePricing(data) {
        if (!data || !data.pricing) return data
        const p = data.pricing
        p.base_amount_fmt       = nzd(p.base_amount)
        p.subtotal_ex_gst_fmt   = nzd(p.subtotal_ex_gst)
        p.gst_amount_fmt        = nzd(p.gst_amount)
        p.total_inc_gst_fmt     = nzd(p.total_inc_gst)
        p.annualised_inc_gst_fmt = nzd(p.annualised_inc_gst)
        p.discount_fmt          = nzd(p.discount)
        p.discount_positive     = (p.discount || 0) > 0 ? true : false
        p.addons = (p.addons || []).map(function (a) {
          return Object.assign({}, a, { amount_fmt: nzd(a.amount) })
        })
        return data
      }

      function loadData() {
        if (window.PROPOSAL_DATA) return window.PROPOSAL_DATA
        const el = document.getElementById('proposal-data')
        if (!el) return {}
        try { return JSON.parse(el.textContent) } catch (e) { return {} }
      }

      document.addEventListener('DOMContentLoaded', function () {
        const data = decoratePricing(loadData())
        const tpl = document.getElementById('proposal-template').innerHTML
        const tokens = tokenise(tpl)
        document.getElementById('rendered-target').innerHTML = render(tokens, data, 0, tokens.length)
      })
    })()
  </script>
