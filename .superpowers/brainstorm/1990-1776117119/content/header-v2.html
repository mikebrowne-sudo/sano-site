<!DOCTYPE html>
<html>
<head>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Poppins', sans-serif; background: #f0f0f0; }

  .page-label {
    text-align: center;
    padding: 20px;
    font-family: 'Poppins', sans-serif;
    font-size: 13px;
    color: #6B7280;
  }

  .header-wrap {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    background: #fff;
  }

  /* TOP BAR */
  .top-bar {
    background: #344C3D;
    padding: 8px 0;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    gap: 7px;
  }
  .top-bar-inner {
    margin-right: 12%;
    white-space: nowrap;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
  }
  .top-bar svg { flex-shrink: 0; }
  .top-bar .label { color: #a8c5b0; font-size: 13px; font-weight: 400; line-height: 1.5; }
  .top-bar .number { color: #ffffff; font-size: 13px; font-weight: 700; letter-spacing: 0.3px; line-height: 1.5; }

  /* MAIN HEADER */
  .main-header {
    background: #ffffff;
    padding: 16px 24px 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #E0EAE3;
  }

  /* Logo */
  .logo {
    display: flex;
    align-items: center;
    gap: 9px;
    flex-shrink: 0;
    text-decoration: none;
    margin-left: 12%;
  }
  .logo-mark {
    width: 34px;
    height: 34px;
    background: #344C3D;
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .logo-mark span { color: #fff; font-size: 15px; font-weight: 900; }
  .logo-text-wrap { line-height: 1.1; }
  .logo-name { font-size: 15px; font-weight: 900; color: #06231D; letter-spacing: -0.5px; }
  .logo-sub { font-size: 8.5px; color: #9CA3AF; letter-spacing: 1.8px; text-transform: uppercase; }

  /* Nav */
  nav {
    display: flex;
    align-items: center;
    gap: 26px;
  }
  nav span {
    font-size: 15px;
    color: #374151;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 3px;
    line-height: 1.5;
    transition: color 0.15s;
  }
  nav span:hover { color: #344C3D; }
  nav .chevron { font-size: 8px; color: #9CA3AF; }

  /* CTA */
  .cta-wrap {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    flex-shrink: 0;
    margin-right: 12%;
  }
  .cta-btn {
    background: #344C3D;
    color: #ffffff;
    font-family: 'Poppins', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 11px 22px;
    border-radius: 50px;
    cursor: pointer;
    white-space: nowrap;
    box-shadow: 0 2px 8px rgba(52,76,61,0.28);
    display: flex;
    align-items: center;
    gap: 6px;
    border: none;
  }

  /* Page body hint */
  .page-hint {
    background: #F7F9F7;
    height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Poppins', sans-serif;
    font-size: 12px;
    color: #9CA3AF;
  }
</style>
</head>
<body>

<div class="page-label">Header preview — Poppins font, tightened edges, phone above CTA</div>

<div class="header-wrap">

  <!-- TOP BAR: centred above CTA -->
  <div class="top-bar">
    <div class="top-bar-inner">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#a8c5b0" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.8 19.79 19.79 0 01.1 1.18 2 2 0 012.08 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.91 7.09a16 16 0 006 6l.45-.45a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92z"/>
      </svg>
      <span class="label">Call us for a free quote</span>
      <span class="number">0800 726 669</span>
    </div>
  </div>

  <!-- MAIN HEADER -->
  <div class="main-header">

    <a class="logo" href="#">
      <div class="logo-mark"><span>S</span></div>
      <div class="logo-text-wrap">
        <div class="logo-name">sano</div>
        <div class="logo-sub">cleaning</div>
      </div>
    </a>

    <nav>
      <span>Home</span>
      <span>Services <span class="chevron">▾</span></span>
      <span>Join Our Team</span>
      <span>Blog</span>
      <span>About <span class="chevron">▾</span></span>
      <span>Contact Us</span>
    </nav>

    <div class="cta-wrap">
      <button class="cta-btn">Get a Quote &nbsp;→</button>
    </div>

  </div>

</div>

<div class="page-hint">↑ sticky — page content scrolls beneath</div>

</body>
</html>
